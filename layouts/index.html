{{ define "main" }}
<main aria-role="main">
    <header class="homepage-header">
        {{ with .Params.subtitle }}
        <span class="subtitle">{{.}}</span> {{ end }}
    </header>
    <div class="homepage-content">
        {{/* 这里 Content 拉取的是 /content/_index.md 的内容 */}}
        {{ .Content }}
    </div>
    <div>
        {{ range first 10 .Site.RegularPages }} {{ .Render "summary"}} {{ end }}
    </div>
</main>
{{ end }}
