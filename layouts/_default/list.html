{{ define "main" }}
<article>
    <header>
        <h1>{{.Title}}</h1>
    </header>
    <!-- "{{.Content}}" pulls from the markdown content of the corresponding _index.md -->
    {{.Content}}
</article>

<ul>
    {{/* 按照日期来遍历页面 */}}
    {{ range .Pages.ByDate }}
    <li>
        {{/* 列表标题 对应列表下的 _index.html */}}
        <a href="{{ .Permalink }}">{{ .Title }}</a>

        {{ with .Params.tags }}
        {{ range . }}
        <a href="{{ "tags/" | absURL }}{{ . | urlize }}">{{ . }}</a>
        {{ end }}
        {{ end }}
        
        <time>{{ .Date.Format "Jan 2, Mon" }}</time>

    </li>
    {{ end }}
</ul>
{{ end }}
